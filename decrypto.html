<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DECRYPTO — Intercept Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0e14;
    --panel:#12181f;
    --panel-edge:#1c2530;
    --paper:#e8dfc8;
    --paper-shadow:#c9bd9c;
    --amber:#e0a339;
    --amber-dim:#8a662a;
    --teal:#4cc9b0;
    --teal-dim:#2c6f63;
    --ink:#1c1712;
    --text:#e9edf1;
    --muted:#7c8a99;
    --danger:#b23b3b;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    background:var(--void);
    font-family:'IBM Plex Sans', sans-serif;
    color:var(--text);
    overflow-x:hidden;
  }

  /* ---------- Ambient background ---------- */
  .bg{
    position:fixed;
    inset:0;
    z-index:0;
    background:
      radial-gradient(ellipse 120% 80% at 50% -10%, #1a2431 0%, transparent 60%),
      radial-gradient(ellipse 100% 60% at 50% 110%, #0d1319 0%, transparent 60%),
      var(--void);
  }
  .bg::before{
    /* fine grid, like graph paper on an ops desk */
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(rgba(140,160,180,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,160,180,0.045) 1px, transparent 1px);
    background-size:34px 34px;
    mask-image:radial-gradient(ellipse 80% 70% at 50% 40%, black 40%, transparent 90%);
  }
  .bg::after{
    /* scanlines */
    content:"";
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.10) 3px,
      rgba(0,0,0,0) 4px
    );
    opacity:0.5;
  }
  .radar{
    position:absolute;
    top:50%; left:50%;
    width:1400px; height:1400px;
    margin:-700px 0 0 -700px;
    border-radius:50%;
    background:conic-gradient(from 0deg, rgba(224,163,57,0.10), transparent 18%);
    animation:spin 14s linear infinite;
    z-index:0;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  @media (prefers-reduced-motion:reduce){
    .radar{ animation:none; }
  }

  /* ---------- Layout ---------- */
  .stage{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 20px 40px;
    gap:clamp(28px, 5vh, 48px);
  }

  .masthead{
    text-align:center;
    max-width:640px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.35em;
    color:var(--amber-dim);
    text-transform:uppercase;
    margin:0 0 10px;
  }
  h1{
    font-family:'Black Ops One', sans-serif;
    font-weight:400;
    font-size:clamp(2.6rem, 9vw, 4.6rem);
    letter-spacing:0.06em;
    margin:0;
    color:var(--text);
    text-shadow:
      0 0 18px rgba(224,163,57,0.35),
      0 0 46px rgba(224,163,57,0.12);
    line-height:1;
  }
  h1 span{ color:var(--amber); }
  .tagline{
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(0.8rem, 2.4vw, 0.95rem);
    color:var(--muted);
    margin:14px 0 0;
    letter-spacing:0.02em;
  }

  .console{
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .controls{
    display:flex;
    gap:16px;
    width:100%;
  }
  @media (max-width:520px){
    .controls{ flex-direction:column; }
  }

  button.op{
    flex:1;
    position:relative;
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(0.95rem, 2.4vw, 1.05rem);
    font-weight:600;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:20px 18px;
    border-radius:6px;
    cursor:pointer;
    background:var(--panel);
    color:var(--text);
    border:1px solid var(--panel-edge);
    border-bottom-width:4px;
    transition:transform 0.08s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  button.op .lbl-num{
    display:block;
    font-size:10px;
    letter-spacing:0.3em;
    color:var(--muted);
    margin-bottom:8px;
  }
  button.op:active{
    transform:translateY(3px);
    border-bottom-width:1px;
  }
  button.op:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:3px;
  }
  button.op.words:hover{
    border-color:var(--amber-dim);
    box-shadow:0 0 24px rgba(224,163,57,0.15);
    background:#161c22;
  }
  button.op.words .lbl-num{ color:var(--amber-dim); }
  button.op.code:hover{
    border-color:var(--teal-dim);
    box-shadow:0 0 24px rgba(76,201,176,0.15);
    background:#131e1c;
  }
  button.op.code .lbl-num{ color:var(--teal-dim); }

  .counter{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.2em;
    color:var(--muted);
    text-transform:uppercase;
  }
  .counter b{ color:var(--text); font-weight:600;}

  footer{
    position:relative;
    z-index:1;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:#4a5763;
    text-align:center;
    padding:0 20px 22px;
    letter-spacing:0.03em;
  }

  /* ---------- Modal (intercept slip) ---------- */
  .overlay{
    position:fixed;
    inset:0;
    z-index:10;
    background:rgba(4,6,9,0.72);
    backdrop-filter:blur(3px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease;
  }
  .overlay.show{
    opacity:1;
    pointer-events:auto;
  }

  .slip{
    position:relative;
    width:100%;
    max-width:420px;
    background:var(--paper);
    color:var(--ink);
    border-radius:2px;
    padding:28px 26px 26px;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.5),
      0 4px 0 var(--paper-shadow);
    transform:translateY(14px) scale(0.97);
    transition:transform 0.25s cubic-bezier(.2,.8,.2,1);
    background-image:
      repeating-linear-gradient(rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 1px, transparent 1px, transparent 26px);
  }
  .overlay.show .slip{ transform:translateY(0) scale(1); }

  .slip-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    border-bottom:1.5px dashed rgba(28,23,18,0.35);
    padding-bottom:10px;
    margin-bottom:16px;
    font-family:'IBM Plex Mono', monospace;
  }
  .slip-head .doc-no{
    font-size:11px;
    letter-spacing:0.15em;
    color:#6b6252;
  }
  .slip-head .doc-no b{ color:var(--ink); }
  .slip-title{
    font-family:'Black Ops One', sans-serif;
    font-size:1.1rem;
    letter-spacing:0.05em;
    margin:0 0 2px;
  }

  .stamp{
    position:absolute;
    top:18px;
    right:20px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    font-weight:700;
    letter-spacing:0.18em;
    color:var(--danger);
    border:2px solid var(--danger);
    padding:4px 8px;
    border-radius:3px;
    transform:rotate(8deg);
    opacity:0.85;
    text-transform:uppercase;
  }

  .payload{
    min-height:150px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:10px;
    padding:6px 0 10px;
  }

  /* words list */
  .word-row{
    display:flex;
    align-items:baseline;
    gap:14px;
    font-family:'IBM Plex Mono', monospace;
  }
  .word-row .idx{
    font-size:0.85rem;
    color:#8a7d64;
    width:18px;
    flex-shrink:0;
  }
  .word-row .val{
    font-size:clamp(1.15rem, 5vw, 1.5rem);
    font-weight:600;
    letter-spacing:0.03em;
    color:var(--ink);
  }

  /* code digits */
  .code-row{
    display:flex;
    justify-content:center;
    gap:16px;
    padding:14px 0 6px;
  }
  .digit{
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(2.4rem, 12vw, 3.2rem);
    font-weight:700;
    color:var(--ink);
    width:1.4em;
    text-align:center;
    border-bottom:3px solid rgba(28,23,18,0.25);
  }

  .slip-foot{
    display:flex;
    justify-content:flex-end;
    margin-top:10px;
  }
  .slip-foot button{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    background:none;
    border:1.5px solid rgba(28,23,18,0.4);
    color:var(--ink);
    padding:9px 16px;
    border-radius:3px;
    cursor:pointer;
    transition:background 0.15s ease;
  }
  .slip-foot button:hover{ background:rgba(28,23,18,0.08); }

  .sr-only{
    position:absolute;
    width:1px;height:1px;
    padding:0;margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
  }
</style>
</head>
<body>

<div class="bg"><div class="radar"></div></div>

<main class="stage">
  <div class="masthead">
    <p class="eyebrow">// signals intelligence unit</p>
    <h1>DECRY<span>PTO</span></h1>
    <p class="tagline">tap to pull the next intercepted clue words, or generate this round's secret code</p>
  </div>

  <div class="console">
    <div class="controls">
      <button class="op words" id="btnWords" type="button">
        <span class="lbl-num">01 · clue words</span>
        Give Words
      </button>
      <button class="op code" id="btnCode" type="button">
        <span class="lbl-num">02 · cipher</span>
        Give Secret Code
      </button>
    </div>
    <p class="counter">Intercepts logged this session: <b id="counterVal">0</b></p>
  </div>
</main>

<footer>Keep the paper slip out of sight of the opposing team — that's the whole game.</footer>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="slipTitle">
  <div class="slip">
    <div class="stamp" id="stampLbl">Classified</div>
    <div class="slip-head">
      <div>
        <p class="slip-title" id="slipTitle">Transmission</p>
      </div>
      <p class="doc-no">INTERCEPT NO. <b id="docNo">0000</b></p>
    </div>
    <div class="payload" id="payload"></div>
    <div class="slip-foot">
      <button id="closeBtn" type="button">Close</button>
    </div>
  </div>
</div>

<script>
const WORDS = [
"DOG","CAT","LION","TIGER","BEAR","WOLF","FOX","DEER","RABBIT","HORSE",
"COW","PIG","SHEEP","GOAT","DUCK","CHICKEN","EAGLE","OWL","HAWK","PARROT",
"PENGUIN","DOLPHIN","WHALE","SHARK","OCTOPUS","CRAB","LOBSTER","SNAKE","LIZARD","FROG",
"TURTLE","ELEPHANT","GIRAFFE","ZEBRA","MONKEY","GORILLA","KANGAROO","PANDA","KOALA","CAMEL",
"PIZZA","BURGER","PASTA","BREAD","CHEESE","BUTTER","MILK","EGG","RICE","NOODLE",
"SOUP","SALAD","SANDWICH","TACO","SUSHI","CAKE","COOKIE","CHOCOLATE","CANDY","ICECREAM",
"APPLE","BANANA","ORANGE","GRAPE","LEMON","MANGO","PEACH","CHERRY","STRAWBERRY","WATERMELON",
"POTATO","TOMATO","ONION","CARROT","CORN","PEPPER","GARLIC","HONEY","SUGAR","SALT",
"CHAIR","TABLE","LAMP","MIRROR","CLOCK","WINDOW","DOOR","KEY","LOCK","PILLOW",
"BLANKET","CANDLE","BOTTLE","CUP","PLATE","FORK","SPOON","KNIFE","BOWL","BASKET",
"BOX","BAG","UMBRELLA","BRUSH","COMB","SOAP","TOWEL","BUCKET","HAMMER","NAIL",
"SCREW","LADDER","ROPE","CHAIN","BRICK","GLASS","PAPER","PENCIL","PEN","SCISSORS",
"TREE","FLOWER","GRASS","LEAF","ROOT","SEED","RIVER","LAKE","OCEAN","MOUNTAIN",
"HILL","VALLEY","FOREST","DESERT","ISLAND","BEACH","CAVE","VOLCANO","CLOUD","RAIN",
"SNOW","WIND","STORM","THUNDER","LIGHTNING","SUN","MOON","STAR","SKY","EARTH",
"FIRE","ICE","ROCK","SAND","MUD","SOIL","WAVE","TIDE","RAINBOW","FOG",
"CAR","BUS","TRAIN","PLANE","BOAT","SHIP","BICYCLE","MOTORCYCLE","TRUCK","TAXI",
"SUBWAY","HELICOPTER","ROCKET","SUBMARINE","SCOOTER","WAGON","SLED","CANOE","RAFT","TRAM",
"FERRY","JEEP","VAN","CART","SKATEBOARD",
"HEAD","HAND","FOOT","ARM","LEG","EYE","EAR","NOSE","MOUTH","TOOTH",
"HAIR","FINGER","TOE","KNEE","ELBOW","SHOULDER","BACK","CHEST","HEART","BRAIN",
"SHIRT","PANTS","DRESS","SKIRT","JACKET","COAT","HAT","CAP","GLOVES","SOCKS",
"SHOES","BOOTS","BELT","SCARF","SWEATER","TIE","SHORTS","PAJAMAS","SANDALS","SUIT",
"DOCTOR","TEACHER","FARMER","CHEF","PILOT","POLICE","FIREFIGHTER","NURSE","LAWYER","ARTIST",
"MUSICIAN","DANCER","WRITER","ACTOR","SCIENTIST","ENGINEER","SOLDIER","SAILOR","BAKER","BARBER",
"SOCCER","BASKETBALL","TENNIS","GOLF","BASEBALL","HOCKEY","BOXING","SWIMMING","RUNNING","CYCLING",
"SKIING","SURFING","BOWLING","CHESS","CARDS","PUZZLE","DARTS","ARCHERY","WRESTLING","VOLLEYBALL",
"SCHOOL","HOSPITAL","CHURCH","LIBRARY","MUSEUM","PARK","ZOO","FARM","FACTORY","OFFICE",
"KITCHEN","BEDROOM","BATHROOM","GARDEN","GARAGE","BRIDGE","TUNNEL","CASTLE","TOWER","PALACE",
"PLANET","GALAXY","COMET","ASTEROID","SATELLITE","TELESCOPE","MAGNET","BATTERY","ROBOT","COMPUTER",
"PHONE","CAMERA","TELEVISION","RADIO","GUITAR","PIANO","DRUM","VIOLIN","TRUMPET","FLUTE",
"SPIDER","ANT","BEE","BUTTERFLY","WORM","SNAIL","MOSQUITO","FLY","BEETLE","CATERPILLAR",
"JELLYFISH","STARFISH","SEAHORSE","SQUID","WALRUS","SEAL","OTTER","BEAVER","RACCOON","SQUIRREL",
"HEDGEHOG","BAT","MOUSE","RAT","HAMSTER","FERRET","PEACOCK","FLAMINGO","OSTRICH","STORK",
"CROW","SPARROW","ROBIN","WOODPECKER","VULTURE",
"SCREWDRIVER","WRENCH","PLIERS","DRILL","SAW","SHOVEL","RAKE","HOSE","FLASHLIGHT","TOOLBOX",
"PAINT","TAPE","STAPLER","MAGNIFIER","COMPASS","RULER","CALCULATOR","NOTEBOOK","ENVELOPE","STAMP",
"LAPTOP","TABLET","KEYBOARD","JOYSTICK","SPEAKER","HEADPHONES","CHARGER","PRINTER","SCANNER","MICROSCOPE",
"MICROPHONE","PROJECTOR","ROUTER","MONITOR","REMOTE","FLASHDRIVE","WEBCAM","DRONE","CALENDAR","WALLET",
"BIRTHDAY","HOLIDAY","WEDDING","PARTY","PARADE","FIREWORKS","GIFT","BALLOON","CONFETTI","RIBBON",
"CROWN","MEDAL","TROPHY","FLAG","BANNER","COSTUME","MASK","MAGIC","CIRCUS","CARNIVAL"
];

const overlay = document.getElementById('overlay');
const payload = document.getElementById('payload');
const slipTitle = document.getElementById('slipTitle');
const docNo = document.getElementById('docNo');
const stampLbl = document.getElementById('stampLbl');
const counterVal = document.getElementById('counterVal');
const SCRAMBLE_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const SCRAMBLE_DIGITS = '1234';

let intercepts = 0;
let activeTimers = [];

function clearTimers(){
  activeTimers.forEach(t => clearInterval(t));
  activeTimers = [];
}

function pad4(n){ return String(n).padStart(4,'0'); }

function openOverlay(){
  overlay.classList.add('show');
  document.addEventListener('keydown', onKey);
}
function closeOverlay(){
  overlay.classList.remove('show');
  clearTimers();
  document.removeEventListener('keydown', onKey);
}
function onKey(e){ if(e.key === 'Escape') closeOverlay(); }

document.getElementById('closeBtn').addEventListener('click', closeOverlay);
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeOverlay(); });

function scrambleReveal(el, finalText, charset, duration, delay){
  let elapsed = 0;
  const tick = 40;
  setTimeout(() => {
    const timer = setInterval(() => {
      elapsed += tick;
      if(elapsed >= duration){
        clearInterval(timer);
        el.textContent = finalText;
        return;
      }
      let out = '';
      for(let i=0;i<finalText.length;i++){
        out += charset[Math.floor(Math.random()*charset.length)];
      }
      el.textContent = out;
    }, tick);
    activeTimers.push(timer);
  }, delay);
}

function pickRandomWords(n){
  const pool = WORDS.slice();
  const chosen = [];
  for(let i=0;i<n;i++){
    const idx = Math.floor(Math.random()*pool.length);
    chosen.push(pool[idx]);
    pool.splice(idx,1);
  }
  return chosen;
}

function generateCode(){
  const digits = [1,2,3,4];
  for(let i = digits.length - 1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [digits[i], digits[j]] = [digits[j], digits[i]];
  }
  return digits.slice(0,3);
}

function newDocNumber(){
  intercepts += 1;
  counterVal.textContent = intercepts;
  docNo.textContent = pad4(intercepts * 7 + 12);
}

document.getElementById('btnWords').addEventListener('click', () => {
  clearTimers();
  newDocNumber();
  slipTitle.textContent = 'Clue Words';
  stampLbl.textContent = 'Eyes Only';
  const chosen = pickRandomWords(4);
  payload.innerHTML = '';
  chosen.forEach((w, i) => {
    const row = document.createElement('div');
    row.className = 'word-row';
    const idx = document.createElement('span');
    idx.className = 'idx';
    idx.textContent = (i+1) + '.';
    const val = document.createElement('span');
    val.className = 'val';
    val.textContent = '';
    row.appendChild(idx);
    row.appendChild(val);
    payload.appendChild(row);
    scrambleReveal(val, w, SCRAMBLE_CHARS, 500, i*180);
  });
  openOverlay();
});

document.getElementById('btnCode').addEventListener('click', () => {
  clearTimers();
  newDocNumber();
  slipTitle.textContent = 'Secret Code';
  stampLbl.textContent = 'Burn After Reading';
  const digits = generateCode();
  payload.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'code-row';
  payload.appendChild(row);
  digits.forEach((d, i) => {
    const box = document.createElement('span');
    box.className = 'digit';
    box.textContent = '';
    row.appendChild(box);
    scrambleReveal(box, String(d), SCRAMBLE_DIGITS, 550, i*220);
  });
  openOverlay();
});
</script>
</body>
</html>
