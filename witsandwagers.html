<style>
  :root{
    --felt:#0d3327;
    --felt-deep:#082019;
    --felt-line:#1a4a3a;
    --cream:#f3e9d2;
    --cream-shadow:#d8c9a3;
    --brass:#c9a24b;
    --brass-bright:#e8c470;
    --maroon:#8a2a35;
    --maroon-bright:#b0333f;
    --ink:#241c12;
    --text:#f2ede0;
    --muted:#9db3a7;
    --board:#0c0f0e;
    --amber:#f5a623;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100vh;
    background:var(--felt-deep);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    overflow-x:hidden;
  }

  /* ---------- felt table background ---------- */
  .bg{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 100% 70% at 50% -10%, #164536 0%, transparent 55%),
      radial-gradient(ellipse 90% 70% at 50% 115%, #061713 0%, transparent 60%),
      var(--felt);
  }
  .bg::before{
    /* felt weave texture */
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 4px),
      repeating-linear-gradient(-45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 4px);
  }
  .bg::after{
    /* rail border vignette, like a card table edge */
    content:"";
    position:absolute; inset:18px;
    border:3px solid rgba(201,162,75,0.14);
    border-radius:24px;
    box-shadow:
      inset 0 0 90px rgba(0,0,0,0.55),
      0 0 60px rgba(0,0,0,0.4);
  }
  @media (max-width:640px){
    .bg::after{ inset:8px; border-radius:14px; }
  }

  main{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:36px 20px 44px;
    gap:clamp(24px, 4.5vh, 38px);
  }

  .masthead{ text-align:center; max-width:560px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.34em;
    text-transform:uppercase;
    color:var(--brass);
    margin:0 0 10px;
    opacity:0.85;
  }
  h1{
    font-family:'Alfa Slab One', serif;
    font-weight:400;
    font-size:clamp(2.1rem, 8vw, 3.6rem);
    margin:0;
    letter-spacing:0.01em;
    color:var(--cream);
    text-shadow:
      0 3px 0 rgba(0,0,0,0.35),
      0 0 26px rgba(201,162,75,0.2);
  }
  h1 span{ color:var(--brass-bright); }
  .tagline{
    font-family:'IBM Plex Mono', monospace;
    font-size:clamp(0.8rem, 2.2vw, 0.92rem);
    color:var(--muted);
    margin:12px 0 0;
  }

  .table{
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
  }

  /* ---------- buttons ---------- */
  button.action{
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:clamp(0.95rem, 2.6vw, 1.1rem);
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:16px 34px;
    border-radius:999px;
    cursor:pointer;
    border:none;
    transition:transform 0.08s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    -webkit-tap-highlight-color:transparent;
    width:100%;
    max-width:340px;
  }
  button.action:active{ transform:translateY(2px); }
  button.action:focus-visible{ outline:2px solid var(--brass-bright); outline-offset:3px; }

  button.deal{
    background:linear-gradient(180deg, var(--brass-bright), var(--brass));
    color:#241c0c;
    box-shadow:0 6px 0 #8a6d2f, 0 10px 20px rgba(0,0,0,0.35);
  }
  button.deal:hover{ box-shadow:0 6px 0 #8a6d2f, 0 12px 26px rgba(201,162,75,0.28); }
  button.deal:active{ box-shadow:0 2px 0 #8a6d2f; }

  button.reveal{
    background:linear-gradient(180deg, var(--maroon-bright), var(--maroon));
    color:var(--cream);
    box-shadow:0 6px 0 #5c1c24, 0 10px 20px rgba(0,0,0,0.35);
  }
  button.reveal:hover{ box-shadow:0 6px 0 #5c1c24, 0 12px 26px rgba(176,51,63,0.3); }
  button.reveal:active{ box-shadow:0 2px 0 #5c1c24; }
  button.reveal:disabled{
    opacity:0.4;
    cursor:not-allowed;
    box-shadow:0 6px 0 #5c1c24;
  }

  /* ---------- question ticket ---------- */
  .ticket{
    width:100%;
    background:var(--cream);
    color:var(--ink);
    border-radius:8px;
    padding:22px 22px 20px;
    box-shadow:0 14px 30px rgba(0,0,0,0.35), 0 3px 0 var(--cream-shadow);
    position:relative;
    min-height:118px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .ticket::before{
    content:"";
    position:absolute; inset:8px;
    border:1.5px dashed rgba(36,28,18,0.25);
    border-radius:5px;
    pointer-events:none;
  }
  .ticket .tkt-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.24em;
    text-transform:uppercase;
    color:#8a7248;
    margin:0 0 8px;
  }
  .ticket .tkt-question{
    font-family:'IBM Plex Sans', sans-serif;
    font-size:clamp(1.02rem, 3.4vw, 1.2rem);
    font-weight:500;
    line-height:1.4;
    margin:0;
  }
  .ticket .tkt-question.placeholder{
    color:#9a8b66;
    font-style:italic;
    font-weight:400;
  }

  /* ---------- tote board ---------- */
  .board-wrap{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    min-height:104px;
    justify-content:center;
  }
  .board-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--muted);
    opacity:0;
    transition:opacity 0.2s ease;
  }
  .board-label.show{ opacity:1; }

  .board{
    display:flex;
    gap:6px;
    padding:14px 18px;
    background:var(--board);
    border-radius:8px;
    border:3px solid #2a2f27;
    box-shadow:inset 0 2px 10px rgba(0,0,0,0.6), 0 10px 24px rgba(0,0,0,0.4);
    opacity:0;
    transform:translateY(8px);
    transition:opacity 0.25s ease, transform 0.25s ease;
  }
  .board.show{ opacity:1; transform:translateY(0); }

  .flip-digit{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size:clamp(2.2rem, 9vw, 3rem);
    color:var(--amber);
    background:#151a15;
    width:1.05em;
    text-align:center;
    border-radius:4px;
    padding:4px 0;
    text-shadow:0 0 12px rgba(245,166,35,0.55);
  }

  footer{
    position:relative; z-index:1;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:#6f8a7c;
    text-align:center;
    padding:0 20px 20px;
  }

</head>

<div class="bg"></div>

<main>

    </div>
  </div>
</main>

const questionText = document.getElementById('questionText');
const btnDeal = document.getElementById('btnDeal');
const btnReveal = document.getElementById('btnReveal');
const board = document.getElementById('board');
const boardLabel = document.getElementById('boardLabel');

let currentAnswer = null;
let usedIndexes = new Set();
let activeTimers = [];

function clearTimers(){
  activeTimers.forEach(t => clearInterval(t));
  activeTimers = [];
}

function pickQuestion(){
  if(usedIndexes.size >= Q.length) usedIndexes.clear();
  let idx;
  do{ idx = Math.floor(Math.random() * Q.length); } while(usedIndexes.has(idx));
  usedIndexes.add(idx);
  return Q[idx];
}

function resetBoard(){
  clearTimers();
  board.classList.remove('show');
  boardLabel.classList.remove('show');
  board.innerHTML = '';
}

btnDeal.addEventListener('click', () => {
  const item = pickQuestion();
  currentAnswer = item.a;
  questionText.textContent = item.q;
  questionText.classList.remove('placeholder');
  resetBoard();
  btnReveal.disabled = false;
});

btnReveal.addEventListener('click', () => {
  if(currentAnswer === null) return;
  clearTimers();
  const digits = String(currentAnswer).split('');
  board.innerHTML = '';
  board.classList.add('show');
  boardLabel.classList.add('show');

  digits.forEach((d, i) => {
    const span = document.createElement('span');
    span.className = 'flip-digit';
    span.textContent = '0';
    board.appendChild(span);

    let elapsed = 0;
    const duration = 450;
    const tick = 40;
    setTimeout(() => {
      const timer = setInterval(() => {
        elapsed += tick;
        if(elapsed >= duration){
          clearInterval(timer);
          span.textContent = d;
          return;
        }
        span.textContent = Math.floor(Math.random()*10);
      }, tick);
      activeTimers.push(timer);
    }, i*120);
  });

  btnReveal.disabled = true;
});
</script>
