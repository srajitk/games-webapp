<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monikers</title>

<style>
:root{--bg:#1a1025;--panel:#241433;--accent:#ff6b35;--accent2:#7c3aed;--green:#22c55e;--red:#ef4444;--text:#f4f0ff;--muted:#b7a9cf}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Roboto,Arial,sans-serif;background:linear-gradient(160deg,#1a1025,#2d1b4e 60%,#1a1025);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
h1{font-size:2.2rem;margin:0 0 4px;letter-spacing:1px}
h1 span{color:var(--accent)}
.subtitle{color:var(--muted);margin-bottom:24px;text-align:center}
.card-box{background:var(--panel);border-radius:18px;padding:28px;width:100%;max-width:640px;box-shadow:0 10px 40px rgba(0,0,0,.4);margin-bottom:20px}
label{display:block;margin:14px 0 6px;font-weight:600;color:var(--muted)}
input[type=number]{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #3d2a5c;background:#150c22;color:var(--text);font-size:1rem}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>div{flex:1;min-width:140px}
button{cursor:pointer;border:none;border-radius:12px;font-weight:700;font-size:1rem;padding:12px 18px;transition:transform .1s,opacity .2s}
button:disabled{opacity:.4;cursor:not-allowed}
button:active:not(:disabled){transform:scale(.96)}
.btn-primary{background:var(--accent);color:#1a1025}
.btn-secondary{background:#3d2a5c;color:var(--text)}
.btn-green{background:var(--green);color:#062b12}
.btn-red{background:var(--red);color:#2b0606}
.btn-grey{background:#564679;color:var(--text)}
.btn-full{width:100%;margin-top:18px;padding:14px;font-size:1.1rem}
.teams-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.team-row{display:flex;gap:8px;align-items:center}
.team-row input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #3d2a5c;background:#150c22;color:var(--text);font-size:1rem}
.remove-x{background:var(--red);color:#fff;border-radius:50%;width:30px;height:30px;flex:none;padding:0;font-size:1rem}
.hidden{display:none!important}
.game-wrap{width:100%;max-width:640px;display:flex;flex-direction:column;align-items:center;gap:16px}
.scoreboard{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%}
.score-pill{background:var(--panel);padding:8px 16px;border-radius:30px;font-weight:600;border:2px solid #3d2a5c;font-size:.95rem}
.score-pill.active{border-color:var(--accent);color:var(--accent)}
.round-banner{background:linear-gradient(90deg,var(--accent2),var(--accent));padding:8px 20px;border-radius:30px;font-weight:700;letter-spacing:.5px}
.timer{font-size:3.2rem;font-weight:800;font-variant-numeric:tabular-nums}
.timer.low{color:var(--red)}
.turn-info{text-align:center;color:var(--muted)}
.turn-info b{color:var(--text)}
.card-display{background:var(--panel);width:100%;min-height:220px;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 20px;box-shadow:0 10px 30px rgba(0,0,0,.5);border:3px solid var(--accent2)}
#cardName{font-size:1.9rem;font-weight:700}
.card-points{margin-top:10px;font-size:1rem;font-weight:700;color:var(--accent);background:rgba(255,107,53,.15);padding:4px 14px;border-radius:20px}
.card-description{margin-top:14px;font-size:1rem;font-style:italic;color:var(--muted);max-width:480px;line-height:1.4}
.deck-count{color:var(--muted);font-size:.9rem}
.controls{display:flex;gap:14px;width:100%}
.controls button{flex:1;font-size:1.2rem;padding:18px}
.util-row{display:flex;gap:10px;width:100%;justify-content:center;flex-wrap:wrap}
.util-row button{font-size:.9rem;padding:10px 16px}
.start-turn-box{text-align:center}
.start-turn-box .big-team{font-size:2rem;font-weight:800;color:var(--accent);margin:10px 0}
.recap{background:var(--panel);border-radius:18px;padding:24px;width:100%;max-width:640px}
.recap table{width:100%;border-collapse:collapse;margin-top:10px}
.recap th,.recap td{padding:8px;border-bottom:1px solid #3d2a5c;text-align:left}
.recap th:not(:first-child),.recap td:not(:first-child){text-align:center}
.winner-banner{text-align:center;font-size:1.4rem;font-weight:800;color:var(--accent);margin-bottom:10px}
small.hint{color:var(--muted);display:block;margin-top:4px;font-size:.82rem}
@media (max-width:640px){
body{padding:14px 10px}
h1{font-size:1.7rem}
.subtitle{font-size:.9rem;margin-bottom:16px}
.card-box{padding:18px;border-radius:14px}
.row{flex-direction:column;gap:0}
.timer{font-size:2.4rem}
.card-display{min-height:170px;padding:20px 14px;border-radius:16px}
#cardName{font-size:1.4rem}
.card-description{font-size:.88rem}
.controls{gap:10px}
.controls button{font-size:1rem;padding:16px 10px}
.util-row{gap:8px}
.util-row button{font-size:.8rem;padding:10px 12px;flex:1 1 auto}
.score-pill{font-size:.82rem;padding:6px 12px}
.round-banner{font-size:.85rem;padding:6px 14px;text-align:center}
.start-turn-box .big-team{font-size:1.6rem}
.recap{padding:16px}
.recap th,.recap td{padding:6px 4px;font-size:.85rem}
.winner-banner{font-size:1.15rem}
}
@media (max-width:400px){.controls{flex-direction:column}.controls button{width:100%}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal-box{background:var(--panel);padding:26px;border-radius:18px;max-width:340px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.5);border:2px solid var(--accent2)}
.modal-box p{font-size:1.05rem;line-height:1.4;margin:0 0 18px}
.modal-btns{display:flex;gap:12px;justify-content:center}
.modal-btns button{flex:1;padding:12px 16px;font-size:1rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.modal-box{background:var(--panel);border-radius:16px;padding:24px;max-width:380px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.6);border:2px solid var(--accent2)}
.modal-box p{font-size:1.1rem;margin:0 0 18px;color:var(--text)}
.modal-buttons{display:flex;gap:12px}
.modal-buttons button{flex:1;padding:12px;font-size:1rem}
</style>
</head>

<h1>🎭 <span>Monikers</span></h1>
<div class="subtitle">Describe it, say One Word, then Act it Out</div>

<div id="setupScreen" class="card-box">
  <label>Teams</label>
  <div id="teamsList" class="teams-list"></div>
  <button class="btn-secondary" id="addTeamBtn" style="margin-top:8px">+ Add Team</button>
  <div class="row">
    <div>
      <label>Round length (seconds)</label>
      <input type="number" id="roundLength" value="60" min="10" max="180">
    </div>
    <div>
      <label>Number of cards to play</label>
      <input type="number" id="numCards" value="60" min="8" max="1607">
    </div>
  </div>
  <small class="hint" id="mixInfo"></small>
  <button class="btn-primary btn-full" id="startGameBtn">Start Game →</button>
</div>

<div id="startTurnScreen" class="game-wrap hidden">
  <div class="round-banner" id="roundBannerStart"></div>
  <div class="card-box start-turn-box">
    <div>Get ready,</div>
    <div class="big-team" id="upNextTeam"></div>
    <div id="roundRuleText" class="turn-info"></div>
    <button class="btn-primary btn-full" id="beginTurnBtn">Start My Turn ▶</button>
  </div>
</div>

<div id="gameScreen" class="game-wrap hidden">
  <div class="scoreboard" id="scoreboard"></div>
  <div class="round-banner" id="roundBanner"></div>
  <div class="turn-info">Team on the clock: <b id="activeTeamName"></b></div>
  <div class="timer" id="timer">60</div>
  <div class="card-display" id="cardDisplay">
    <div id="cardName">—</div>
    <div id="cardPoints" class="card-points"></div>
    <div id="cardDescription" class="card-description"></div>
  </div>
  <div class="deck-count" id="deckCount"></div>
  <div class="controls">
    <button class="btn-red" id="passBtn">⏭ Pass</button>
    <button class="btn-green" id="correctBtn">✔ Correct</button>
  </div>
  <div class="util-row">
    <button class="btn-grey" id="undoBtn">↩ Undo</button>
    <button class="btn-grey" id="pauseBtn">⏸ Pause</button>
    <button class="btn-grey" id="endTurnBtn">⏹ End Turn</button>
    <button class="btn-grey" id="muteBtn">🔊 Sound On</button>
  </div>
</div>

<div id="endScreen" class="recap hidden">
  <div class="winner-banner" id="winnerBanner"></div>
  <table><thead><tr id="recapHeader"></tr></thead><tbody id="recapBody"></tbody></table>
  <button class="btn-primary btn-full" id="restartBtn">🔁 New Game</button>
</div>

<div id="customModalOverlay" class="modal-overlay hidden">
  <div class="modal-box">
    <p id="customModalText"></p>
    <div class="modal-buttons" id="customModalButtons"></div>
  </div>
</div>

/* split into 4 arrays by point value */
const CARD_POOLS = {1:[],2:[],3:[],4:[]};
CARDS_RAW.split("\n").forEach(line=>{
  if(!line) return;
  const parts = line.split("|");
  const name = parts[0], pts = parseInt(parts[1])||1, desc = parts[2]||"";
  if(!CARD_POOLS[pts]) CARD_POOLS[pts] = [];
  CARD_POOLS[pts].push({name, points:pts, description:desc});
});

  "Exactly ONE word as your clue. No sounds, no gestures.",
  "No talking at all - act it out like charades!"

function $(id){ return document.getElementById(id); }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* pick N cards using point-value mix: 30% 1pt, 30% 2pt, 20% 3pt, 20% 4pt */
function pickDeck(n){
  const mix = {1:0.3, 2:0.3, 3:0.2, 4:0.2};
  let picked = [];
  let counts = {};
  let total = 0;
  [1,2,3,4].forEach(p=>{
    const want = Math.round(n*mix[p]);
    counts[p] = want;
    total += want;
  });
  /* fix rounding so total matches n exactly */
  let diff = n - total;
  counts[1] += diff;

  [1,2,3,4].forEach(p=>{
    const pool = shuffle(CARD_POOLS[p] || []);
    const take = Math.min(counts[p], pool.length);
    picked = picked.concat(pool.slice(0, take));
  });

  /* if a point-tier ran short, backfill from any remaining pool */
  if(picked.length < n){
    const used = new Set(picked.map(c=>c.name));
    let extra = [];
    [1,2,3,4].forEach(p=>{
      (CARD_POOLS[p]||[]).forEach(c=>{ if(!used.has(c.name)) extra.push(c); });
    });
    extra = shuffle(extra);
    picked = picked.concat(extra.slice(0, n - picked.length));
  }
  return shuffle(picked);
}

  const numCards = Math.min(parseInt($('numCards').value) || 60, totalAvail);

function refillRoundDeckIfNeeded(){
  if(roundDeck.length === 0 && cardsRemainingThisRound.length > 0){
    roundDeck = shuffle(cardsRemainingThisRound);
  }
}

function nextCard(){
  refillRoundDeckIfNeeded();
  if(roundDeck.length === 0){
    $('cardName').textContent = "\uD83C\uDF89 All cards guessed!";
    $('cardPoints').textContent = '';
    $('cardDescription').textContent = '';
    $('deckCount').textContent = '';
    $('passBtn').disabled = true;
    $('correctBtn').disabled = true;
    return;
  }
  $('passBtn').disabled = false;
  $('correctBtn').disabled = false;
  const card = roundDeck[0];
  $('cardName').textContent = card.name;
  $('cardPoints').textContent = card.points+' pt'+(card.points>1?'s':'');
  $('cardDescription').textContent = card.description || '';
  $('deckCount').textContent = cardsRemainingThisRound.length+' card(s) left this round';
}

function beginTurn(){
  turnActive = true;
  $('roundBanner').textContent = 'Round '+currentRound+': '+ROUND_NAMES[currentRound-1];
  $('activeTeamName').textContent = teams[activeTeamIndex].name;
  renderScoreboard();
  actionHistory = [];
  refillRoundDeckIfNeeded();
  nextCard();
  timeLeft = roundLength;
  updateTimerDisplay();
  $('undoBtn').disabled = true;
  $('endTurnBtn').disabled = false;
  clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
}

function updateTimerDisplay(){
  $('timer').textContent = timeLeft;
  $('timer').classList.toggle('low', timeLeft <= 10);
}

function tick(){
  timeLeft--;
  updateTimerDisplay();
  if(timeLeft <= 0){
    SoundFX.timeUp();
    finishTurn();
  } else if(timeLeft <= 3){
    SoundFX.tick();
  }
}

function finishTurn(){
  if(!turnActive) return;
  turnActive = false;
  clearInterval(timerInterval);
  timerInterval = null;
  $('passBtn').disabled = true;
  $('correctBtn').disabled = true;
  $('undoBtn').disabled = true;
  $('endTurnBtn').disabled = true;

  activeTeamIndex = (activeTeamIndex + 1) % teams.length;

  if(cardsRemainingThisRound.length === 0){
    if(currentRound < 3){
      currentRound++;
      startRound();
    } else {
      showEndScreen();
      return;
    }
  }
  showStartTurnScreen();
}

$('correctBtn').addEventListener('click', ()=>{
  if(!turnActive || roundDeck.length === 0) return;
  const card = roundDeck.shift();
  const idx = cardsRemainingThisRound.indexOf(card);
  if(idx > -1) cardsRemainingThisRound.splice(idx,1);
  teams[activeTeamIndex].scores[currentRound-1] += card.points;
  teams[activeTeamIndex].total += card.points;
  SoundFX.correct();
  actionHistory.push({type:'correct', card, teamIndex:activeTeamIndex, round:currentRound});
  $('undoBtn').disabled = false;
  renderScoreboard();
  nextCard();
});

$('passBtn').addEventListener('click', ()=>{
  if(!turnActive || roundDeck.length === 0) return;
  const card = roundDeck.shift();
  roundDeck.push(card);
  SoundFX.pass();
  actionHistory.push({type:'pass', card, teamIndex:activeTeamIndex, round:currentRound});
  $('undoBtn').disabled = false;
  nextCard();
});

$('undoBtn').addEventListener('click', ()=>{
  if(!turnActive) return;
  const last = actionHistory.pop();
  if(!last) return;
  if(last.type === 'correct'){
    teams[last.teamIndex].scores[last.round-1] -= last.card.points;
    teams[last.teamIndex].total -= last.card.points;
    cardsRemainingThisRound.unshift(last.card);
    roundDeck.unshift(last.card);
  } else if(last.type === 'pass'){
    const backIdx = roundDeck.lastIndexOf(last.card);
    if(backIdx > -1) roundDeck.splice(backIdx,1);
    roundDeck.unshift(last.card);
  }
  $('undoBtn').disabled = actionHistory.length === 0;
  renderScoreboard();
  nextCard();
});

$('endTurnBtn').addEventListener('click', ()=>{
  if(!turnActive) return;
  if(confirm('End your turn early?')) finishTurn();
});

function pauseGame(){
  if(!turnActive || isPaused) return;
  isPaused = true;
  clearInterval(timerInterval);
  timerInterval = null;
  $('passBtn').disabled = true;
  $('correctBtn').disabled = true;
  $('undoBtn').disabled = true;
  $('endTurnBtn').disabled = true;
  $('pauseBtn').disabled = true;
  /* native alert() blocks the entire page - nothing else can be clicked
     until it is dismissed, and it only has a single OK button. */
  alert('Game Paused.\nClick OK to Resume.');
  isPaused = false;
  $('pauseBtn').disabled = false;
  $('endTurnBtn').disabled = false;
  $('undoBtn').disabled = actionHistory.length === 0;
  const deckEmpty = roundDeck.length === 0;
  $('passBtn').disabled = deckEmpty;
  $('correctBtn').disabled = deckEmpty;
  timerInterval = setInterval(tick, 1000);
}
$('pauseBtn').addEventListener('click', pauseGame);

$('muteBtn').addEventListener('click', ()=>{
  const newMuted = !SoundFX.isMuted();
  SoundFX.setMuted(newMuted);
  $('muteBtn').textContent = newMuted ? '\uD83D\uDD07 Sound Off' : '\uD83D\uDD0A Sound On';
});

function showEndScreen(){
  $('gameScreen').classList.add('hidden');
  $('startTurnScreen').classList.add('hidden');
  $('endScreen').classList.remove('hidden');
  const sorted = teams.slice().sort((a,b)=>b.total-a.total);
  const top = sorted[0];
  const tie = sorted.filter(t=>t.total === top.total);
  $('winnerBanner').textContent = tie.length > 1
    ? "\uD83E\uDD1D It's a tie at "+top.total+" points: "+tie.map(t=>t.name).join(' & ')+"!"
    : "\uD83C\uDFC6 "+top.name+" wins with "+top.total+" points!";
  const header = $('recapHeader');
  header.innerHTML = '<th>Team</th><th>'+ROUND_NAMES[0]+'</th><th>'+ROUND_NAMES[1]+'</th><th>'+ROUND_NAMES[2]+'</th><th>Total</th>';
  const body = $('recapBody');
  body.innerHTML = '';
  teams.forEach(t=>{
    const tr = document.createElement('tr');
    tr.innerHTML = '<td><b>'+t.name+'</b></td><td>'+t.scores[0]+'</td><td>'+t.scores[1]+'</td><td>'+t.scores[2]+'</td><td><b>'+t.total+'</b></td>';
    body.appendChild(tr);
  });
}

$('restartBtn').addEventListener('click', ()=>{
  teams.forEach(t=>{ t.scores=[0,0,0]; t.total=0; });
  currentRound = 1;
  activeTeamIndex = 0;
  gameInProgress = false;
  $('endScreen').classList.add('hidden');
  $('setupScreen').classList.remove('hidden');
});

/* ---- sound effects (Web Audio API, no external files) ---- */
const SoundFX = (function(){
  let ctx = null;
  let muted = false;
  function getCtx(){
    if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }
  function tone(freq, duration, type, startGain){
    if(muted) return;
    const c = getCtx();
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.value = startGain || 0.25;
    osc.connect(gain);
    gain.connect(c.destination);
    const now = c.currentTime;
    gain.gain.setValueAtTime(startGain || 0.25, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.start(now);
    osc.stop(now + duration);
  }
  return {
    setMuted(v){ muted = v; },
    isMuted(){ return muted; },
    correct(){ tone(880,0.12,'sine',0.3); setTimeout(()=>tone(1320,0.18,'sine',0.25),90); },
    pass(){ tone(180,0.18,'sawtooth',0.2); },
    timeUp(){ tone(220,0.4,'square',0.25); setTimeout(()=>tone(160,0.5,'square',0.25),200); },
    tick(){ tone(700,0.05,'sine',0.08); }
  };
})();

/* ---- custom modal (supports swapped button order, native dialogs can't) ---- */
function showModal(text, buttons){
  $('customModalText').textContent = text;
  const container = $('customModalButtons');
  container.innerHTML = '';
  buttons.forEach(b=>{
    const el = document.createElement('button');
    el.textContent = b.label;
    el.className = b.className || 'btn-grey';
    el.addEventListener('click', b.onClick);
    container.appendChild(el);
  });
  $('customModalOverlay').classList.remove('hidden');
}
function closeModal(){
  $('customModalOverlay').classList.add('hidden');
}

/* ---- back-button guard ----
   Pushes a dummy history entry so the mobile/browser back button
   triggers a popstate event instead of immediately leaving the page.
   While a game is in progress, that event is intercepted and a
   two-step confirmation is shown instead of ending the game outright. */
history.pushState(null, document.title, window.location.href);

window.addEventListener('popstate', ()=>{
  if(!gameInProgress){ return; }  // no game running - let back navigate normally
  history.pushState(null, document.title, window.location.href); // cancel this back navigation
  askEndGameStep1();
});

function askEndGameStep1(){
  showModal('End the game and go back to setup?', [
    {label:'Yes', className:'btn-red', onClick: ()=>{ closeModal(); askEndGameStep2(); }},
    {label:'No', className:'btn-grey', onClick: closeModal}
  ]);
}
function askEndGameStep2(){
  /* button positions swapped from step 1, so a hasty repeat tap on the
     same spot lands on "No" instead of accidentally confirming "Yes" twice. */
  showModal('Are you sure? This will end the game right now.', [
    {label:'No', className:'btn-grey', onClick: closeModal},
    {label:'Yes', className:'btn-red', onClick: ()=>{ closeModal(); confirmEndGame(); }}
  ]);
}
function confirmEndGame(){
  gameInProgress = false;
  isPaused = false;
  turnActive = false;
  clearInterval(timerInterval);
  timerInterval = null;
  $('gameScreen').classList.add('hidden');
  $('startTurnScreen').classList.add('hidden');
  $('endScreen').classList.add('hidden');
  $('setupScreen').classList.remove('hidden');
}
</script>
